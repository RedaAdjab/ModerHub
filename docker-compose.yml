services:
  mysql:
    image: mysql:8.4
    container_name: modernhub-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-modern_site}
      MYSQL_USER: ${MYSQL_USER:-modern_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-modern_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
